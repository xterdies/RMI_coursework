  <rect x="870" y="620" width="136" height="42" class="chip" rx="8" ry="8"/>
  <text x="901" y="646" class="chipText">AdminLogsPage</text>
  <text x="871" y="681" class="small">доступно только роли ADMIN</text>

  <path d="M 294 196 L 324 196" class="line"/>
  <path d="M 294 222 L 324 222" class="line"/>
  <path d="M 294 248 L 324 248" class="line"/>
  <path d="M 699 288 L 699 314" class="line"/>
  <path d="M 699 488 L 699 520" class="line"/>

  <rect x="40" y="742" width="1043" height="24" fill="#e2e8f0" rx="10"/>
  <text x="54" y="758" class="small">Маршрутизация описана в frontend/src/App.tsx, а экраны используют общие UI-компоненты, TanStack Query, Zustand и API-сервисы для связи с backend.</text>
